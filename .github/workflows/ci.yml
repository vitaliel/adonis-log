name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  ci:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      PORT: 3333
      HOST: localhost
      LOG_LEVEL: info
      APP_KEY: testing-app-key
      APP_URL: http://localhost:3333
      SESSION_DRIVER: memory

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Setup
        run: |
          cp .env.example .env
          node ace generate:key
          echo "APP_KEY=some-key" >> .env.test

      - name: Test
        run: npm run test
